services:
  - type: web
    name: capto
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 60 --workers 2
    envVars:
      - key: HF_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
